name: Build and Release Extension

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0
    branches:
      - main # Also trigger on main branch pushes for testing (optional)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Zip the extension
        run: |
          cd dist
          zip -r ../dubsync-extension.zip .
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dubsync-extension.zip
          body: "Release of DubSync Extension"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact (for non-tag pushes)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: dubsync-extension
          path: dubsync-extension.zip
